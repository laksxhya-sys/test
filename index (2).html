<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Video Preview</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
        }

        /* Portrait video container - no bars, perfectly fits the video */
        .video-container {
            position: relative;
            width: 360px;
            height: 640px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Native video element scaled perfectly */
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures video fills the area completely with no UI letterboxing */
            display: block;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video 
            src="WhatsApp Video 2026-06-07 at 10.38.36 PM.mp4" 
            autoplay 
            muted 
            loop 
            playsinline>
            Your browser does not support the video tag.
        </video>
    </div>

</body>
</html>
